<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign in - __SITE_TITLE__</title>
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: system-ui, sans-serif;
      background: #101014;
      color: #e8e8ea;
      margin: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    .login-box {
      background: #1a1a20;
      border: 1px solid #2a2a32;
      border-radius: 14px;
      padding: 2.25rem 2rem;
      width: 100%;
      max-width: 360px;
      margin: 1rem;
      box-shadow: 0 12px 40px rgba(0, 0, 0, 0.5);
    }
    h1 { text-align: center; font-size: 1.6rem; margin: 0 0 0.25rem; }
    .subtitle {
      text-align: center;
      color: #8b8b95;
      font-size: 0.85rem;
      margin: 0 0 1.75rem;
    }
    label { display: block; font-size: 0.85rem; margin-bottom: 0.35rem; }
    input {
      width: 100%;
      padding: 0.6rem 0.75rem;
      background: #222229;
      border: 1px solid #33333c;
      border-radius: 8px;
      color: #e8e8ea;
      font-size: 0.9rem;
      font-family: inherit;
      margin-bottom: 1rem;
    }
    input:focus { outline: none; border-color: #555; box-shadow: 0 0 0 3px rgba(255, 255, 255, 0.06); }
    .btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      width: 100%;
      padding: 0.65rem;
      border: none;
      border-radius: 8px;
      font-size: 0.9rem;
      font-family: inherit;
      cursor: pointer;
      text-decoration: none;
    }
    .btn-primary { background: #e8e8ea; color: #16161a; font-weight: 600; }
    .btn-primary:hover { background: #fff; }
    .btn-oidc { background: #222229; color: #e8e8ea; border: 1px solid #33333c; }
    .btn-oidc:hover { background: #2a2a32; }
    .divider {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      margin: 1.4rem 0;
      color: #6b6b75;
      font-size: 0.68rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      white-space: nowrap;
    }
    .divider::before, .divider::after { content: ''; flex: 1; border-top: 1px solid #2a2a32; }
    .error {
      background: rgba(153, 27, 27, 0.2);
      border: 1px solid #7f1d1d;
      color: #fca5a5;
      padding: 0.5rem 0.75rem;
      border-radius: 8px;
      font-size: 0.85rem;
      margin-bottom: 1rem;
    }
    [hidden] { display: none !important; }
  </style>
</head>
<body>
  <div class="login-box">
    <h1>__SITE_TITLE__</h1>
    <p class="subtitle">Admin panel</p>
    <div class="error" __ERROR_HIDDEN__>__ERROR__</div>
    <form method="post" action="login" __PASSWORD_HIDDEN__>
      <label for="username">Username</label>
      <input id="username" name="username" type="text" placeholder="Enter your username" autocomplete="username" autofocus />
      <label for="password">Password</label>
      <input id="password" name="password" type="password" placeholder="Enter your password" autocomplete="current-password" />
      <button class="btn btn-primary" type="submit">Sign in</button>
    </form>
    <div class="divider" __DIVIDER_HIDDEN__><span>or continue with</span></div>
    <a class="btn btn-oidc" href="oidc/login" __OIDC_HIDDEN__>
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M2 12a10 10 0 0 1 18-6"/><path d="M5 12a7 7 0 0 1 12-5"/><path d="M8 12a4 4 0 0 1 8 0v2a8 8 0 0 1-1 4"/><path d="M12 12v3a6 6 0 0 0 2 4"/></svg>
      OpenID Connect
    </a>
  </div>
</body>
</html>
