<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin - multi-downloader</title>
  <link rel="stylesheet" href="/static/style.css?v=__VERSION__" />
</head>
<body>
  <div class="container">
    <header>
      <h1>Admin</h1>
      <p class="subtitle">multi-downloader settings</p>
    </header>

    <form id="config-form">
      <div class="card">
        <h2 class="section-title">Branding</h2>

        <div class="field">
          <label for="site_title">Site title</label>
          <input type="text" id="site_title" name="site_title" />
        </div>

        <div class="field">
          <label for="subtitle">Subtitle</label>
          <input type="text" id="subtitle" name="subtitle" />
        </div>

        <div class="field">
          <label for="accent_color">Accent color</label>
          <input type="color" id="accent_color" name="accent_color" />
        </div>
      </div>

      <div class="card">
        <h2 class="section-title">Content</h2>

        <div class="field">
          <label for="footer_text">Footer text</label>
          <input type="text" id="footer_text" name="footer_text" />
        </div>

        <div class="field field--row">
          <label for="show_paste_button">Show Paste button</label>
          <input type="checkbox" id="show_paste_button" name="show_paste_button" />
        </div>
      </div>

      <div id="save-status" role="status" aria-live="polite"></div>

      <button id="save-btn" type="submit">Save</button>
    </form>

    <div class="card card--danger">
      <h2 class="section-title">Danger zone</h2>
      <p class="danger-desc">Reset all settings to defaults.</p>
      <button id="reset-btn" type="button">Reset to defaults</button>
    </div>
  </div>

  <script src="/static/app.js?v=__VERSION__"></script>
</body>
</html>
