<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#0f0f0f" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <title>__SITE_TITLE__</title>
  <link rel="stylesheet" href="/static/style.css?v=__VERSION__" />
  <style>:root { --accent: __ACCENT_COLOR__; --accent-hover: color-mix(in srgb, __ACCENT_COLOR__ 85%, black); }</style>
  <script>(function(){var t=localStorage.getItem('theme')||'system';document.documentElement.setAttribute('data-theme',t);})()</script>
</head>
<body>
  <div class="container">
    <header>
      <h1>__SITE_TITLE__</h1>
      <p class="subtitle">__SUBTITLE__</p>
    </header>

    <div class="card">
      <div id="preview" hidden>
        <div id="preview-loading" class="preview-loading">
          <span class="spinner spinner--muted"></span>
        </div>
        <div id="preview-content" class="preview-content" hidden>
          <img id="preview-thumb" alt="" />
          <div class="preview-info">
            <p id="preview-title" class="preview-title"></p>
            <p id="preview-meta" class="preview-meta"></p>
          </div>
        </div>
      </div>

      <div class="input-row">
        <input
          id="url-input"
          type="url"
          inputmode="url"
          autocomplete="off"
          autocorrect="off"
          autocapitalize="off"
          spellcheck="false"
          placeholder="https://..."
        />
        <button id="paste-btn" type="button"__PASTE_HIDDEN__>Paste</button>
      </div>

      <div class="download-wrap" id="download-wrap">
        <button id="download-btn" type="button">
          <span class="spinner dl-spinner" hidden></span>
          <span id="dl-label">↓ Download</span>
        </button>
        <button id="quality-toggle" type="button" hidden aria-haspopup="listbox" aria-expanded="false">
          <span id="quality-label">HD</span>
          <svg class="quality-chevron" width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="6 9 12 15 18 9"/></svg>
        </button>
        <div class="quality-menu" id="quality-menu" role="listbox" aria-hidden="true"></div>
      </div>

      <div id="status" role="status" aria-live="polite"></div>
    </div>

    __DISCLAIMER_NOTICE__
    __DEV_BANNER__
  </div>

  <div class="theme-toggle">
    <button class="theme-btn" id="theme-btn" aria-haspopup="true">
      <span id="theme-icon" aria-hidden="true"></span>
      <span id="theme-label">System</span>
      <svg class="theme-chevron" width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="6 9 12 15 18 9"/></svg>
    </button>
    <div class="theme-menu" id="theme-menu" hidden>
      <button class="theme-option" data-theme="system">System</button>
      <button class="theme-option" data-theme="light">Light</button>
      <button class="theme-option" data-theme="dark">Dark</button>
    </div>
  </div>

  <script src="/static/app.js?v=__VERSION__"></script>
  __KOFI_SCRIPT__
</body>
</html>
