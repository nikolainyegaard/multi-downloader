<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#0f0f0f" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <title>multi-downloader</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <div class="container">
    <header>
      <h1>multi-downloader</h1>
      <p class="subtitle">Paste a link, download the video</p>
    </header>

    <div class="card">
      <div class="input-row">
        <input
          id="url-input"
          type="url"
          inputmode="url"
          autocomplete="off"
          autocorrect="off"
          autocapitalize="off"
          spellcheck="false"
          placeholder="https://..."
        />
        <button id="paste-btn" type="button">Paste</button>
      </div>

      <button id="download-btn" type="button">↓ Download</button>

      <div id="status" role="status" aria-live="polite"></div>
    </div>

    <footer>
      Powered by <a href="https://github.com/yt-dlp/yt-dlp" target="_blank" rel="noopener">yt-dlp</a>
    </footer>
  </div>

  <script src="/static/app.js"></script>
</body>
</html>
