services:
  bgutil-provider:
    image: brainicism/bgutil-ytdlp-pot-provider:latest
    container_name: bgutil-provider
    restart: unless-stopped
    networks:
      - downloader_net

  multi-downloader:
    image: ghcr.io/nikolainyegaard/multi-downloader:latest
    container_name: multi-downloader
    restart: unless-stopped
    environment:
      TZ: "Europe/Oslo"
      # Admin panel at /admin. OIDC login is configured in the panel itself
      # (Authentication section); the password here is also the fallback if
      # the OIDC provider breaks.
      ADMIN_USERNAME: "admin"
      ADMIN_PASSWORD: "changeme"
    volumes:
      - ./data:/app/data
    expose:
      - "8000"
    networks:
      - caddy_net
      - downloader_net
    depends_on:
      - bgutil-provider

networks:
  caddy_net:
    external: true
  downloader_net:
