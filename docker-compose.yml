services:
  bgutil-provider:
    image: brainicism/bgutil-ytdlp-pot-provider:latest
    container_name: bgutil-provider
    restart: unless-stopped
    networks:
      - downloader_net

  multi-downloader:
    image: ghcr.io/nikolainyegaard/multi-downloader:latest
    container_name: multi-downloader
    restart: unless-stopped
    environment:
      TZ: "Europe/Oslo"
      # Admin panel at /admin. Credentials are generated on first launch and
      # printed to the container output (docker logs multi-downloader); OIDC
      # is configured in the panel's Authentication section.
      # Locked out? Uncomment, restart, sign in with the printed credentials,
      # then remove it again:
      # AUTH_RESET: "1"
    volumes:
      - ./data:/app/data
    expose:
      - "8000"
    networks:
      - caddy_net
      - downloader_net
    depends_on:
      - bgutil-provider

networks:
  caddy_net:
    external: true
  downloader_net:
