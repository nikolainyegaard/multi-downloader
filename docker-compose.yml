services:
  bgutil-provider:
    image: brainicism/bgutil-ytdlp-pot-provider:latest
    container_name: bgutil-provider
    restart: unless-stopped
    networks:
      - downloader_net

  multi-downloader:
    image: ghcr.io/nikolainyegaard/multi-downloader:latest
    container_name: multi-downloader
    restart: unless-stopped
    environment:
      TZ: "Europe/Oslo"
      # Admin panel at /admin. Enabled when a password or OIDC is configured.
      ADMIN_USERNAME: "admin"
      ADMIN_PASSWORD: "changeme"
      # Optional OIDC login (Authentik, Keycloak, Pocket ID, ...):
      # OIDC_DISCOVERY_URL: "https://auth.example.com/application/o/multi-downloader/.well-known/openid-configuration"
      # OIDC_CLIENT_ID: ""
      # OIDC_CLIENT_SECRET: ""
    volumes:
      - ./data:/app/data
    expose:
      - "8000"
    networks:
      - caddy_net
      - downloader_net
    depends_on:
      - bgutil-provider

networks:
  caddy_net:
    external: true
  downloader_net:
